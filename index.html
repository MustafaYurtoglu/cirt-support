<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CIRT Support</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #222;
      line-height: 1.6;
    }

    .container {
      max-width: 700px;
      margin: 60px auto;
      background: #ffffff;
      padding: 40px 28px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 32px;
      color: #1f1f1f;
    }

    h2 {
      margin-top: 32px;
      font-size: 22px;
      color: #1f1f1f;
    }

    p {
      margin: 12px 0;
      font-size: 16px;
    }

    a {
      color: #0a66c2;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .email-box {
      margin: 20px 0;
      padding: 14px 16px;
      background: #f8f9fb;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      font-size: 16px;
    }

    .footer {
      margin-top: 36px;
      font-size: 14px;
      color: #666;
    }

    @media (max-width: 600px) {
      .container {
        margin: 20px 14px;
        padding: 28px 20px;
      }

      h1 {
        font-size: 26px;
      }

      h2 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>CIRT Support</h1>

    <p>
      If you experience any issues, bugs, or have feedback about the CIRT app, please contact us.
    </p>

    <div class="email-box">
      Email:
      <a href="mailto:yurtoglumustafa01@gmail.com">yurtoglumustafa01@gmail.com</a>
    </div>

    <p>We usually respond within 24 hours.</p>

    <h2>Privacy</h2>
    <p>
      CIRT does not collect, store, or share any personal data.
    </p>

    <div class="footer">
      © 2026 CIRT. All rights reserved.
    </div>
  </div>
</body>
</html>
